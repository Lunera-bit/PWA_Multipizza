<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/carrito"></ion-back-button>
    </ion-buttons>
    <h2>Mis favoritos</h2>
  </ion-toolbar>
</ion-header>


<ion-content class="ion-padding">
  <!-- Loading -->
  <div *ngIf="loading" class="loading-container">
    <p>Cargando favoritos...</p>
  </div>

  <!-- Si no hay favoritos -->
  <div *ngIf="!loading && favoriteProducts.length === 0" class="no-favs">
    <div class="icon-container">
      <span class="material-icons" style="font-size: 60px; color: #ff6b6b;">favorite_border</span>
    </div>
    <p>No tienes productos favoritos</p>
  </div>

  <!-- Lista de favoritos -->
  <div *ngIf="favoriteProducts.length > 0" class="favorites-container">
    <div *ngFor="let p of favoriteProducts" class="favorite-item">
      <div class="item-content">
        <div class="image-container">
          <img [src]="p.imagen" [alt]="p.nombre" class="product-image">
        </div>
        <div class="details">
          <h3 class="product-name">{{ p.nombre }}</h3>
          <p class="product-description">{{ p.descripcion }}</p>
          <p class="product-price">S/ {{ p.precio }}</p>
        </div>
        <button class="remove-button" (click)="toggleFavorite(p.id!)">
          <span class="material-icons" style="color: #ff6b6b; font-size: 24px;">favorite</span>
        </button>
      </div>
    </div>
  </div>
</ion-content>


  <app-footer></app-footer>
